[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1000
max_height      = 1000
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open", for = "linux" },
  { run = 'wslview "$@"', desc = "Open (WSL)", for = "linux" },
]
reveal = [
  { run = 'exiftool "$1"; echo "Press enter to exit"; read _', block = true, desc = "Show EXIF", for = "unix" },
]
extract = [
  { run = 'ya pub extract --list %*', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { name = "*/",              use = [ "edit", "open", "reveal" ] },
  { mime = "text/*",          use = [ "edit", "reveal" ] },
  { mime = "image/*",         use = [ "open", "reveal" ] },
  { mime = "video/*",         use = [ "play", "open", "reveal" ] },
  { mime = "audio/*",         use = [ "play", "reveal" ] },
  { mime = "inode/x-empty",   use = [ "edit", "reveal" ] },
  { mime = "application/json", use = [ "edit", "reveal" ] },
  { mime = "*/javascript",    use = [ "edit", "reveal" ] },
  { mime = "application/zip", use = [ "extract", "reveal" ] },
  { mime = "application/gzip", use = [ "extract", "reveal" ] },
  { mime = "application/x-tar", use = [ "extract", "reveal" ] },
  { mime = "application/x-bzip", use = [ "extract", "reveal" ] },
  { mime = "application/x-bzip2", use = [ "extract", "reveal" ] },
  { mime = "application/x-7z-compressed", use = [ "extract", "reveal" ] },
  { mime = "application/x-rar", use = [ "extract", "reveal" ] },
  { mime = "application/xz",  use = [ "extract", "reveal" ] },
  { mime = "*",               use = [ "open", "reveal" ] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912   # 512MB
image_bound      = [0, 0]
suppress_preload = false

[plugin]
prepend_previewers = [
  { name = "*.md", run = "glow" },
]

prepend_fetchers = [
  { id = "git", name = "*",  run = "git" },
  { id = "git", name = "*/", run = "git" },
]

[input]
cursor_blink = false

# Which key is hovered while composing a find/cd
cd_title      = "Change directory:"
cd_origin     = "top-center"
cd_offset     = [0, 2, 50, 3]

create_title  = ["Create:", "Create (dir):"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

find_title    = ["Find next:", "Find previous:"]
find_origin   = "top-center"
find_offset   = [0, 2, 50, 3]

search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

shell_title   = ["Shell:", "Shell (block):"]
shell_origin  = "top-center"
shell_offset  = [0, 2, 50, 3]

[confirm]
trash_title   = "Trash {n} selected file{s}?"
trash_origin  = "center"
trash_offset  = [0, 0, 70, 20]

delete_title  = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

overwrite_title   = "Overwrite file?"
overwrite_content = "Will overwrite the following file:"
overwrite_origin  = "center"
overwrite_offset  = [0, 0, 50, 15]

quit_title   = "Quit?"
quit_content = "{n} task{s} running, are you sure you want to quit?"
quit_origin  = "center"
quit_offset  = [0, 0, 50, 15]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
