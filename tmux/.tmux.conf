# ============================================================
# PREFIX
# ============================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================
# SANE DEFAULTS
# ============================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'
# OSC 8 clickable hyperlinks + colored/curly underlines (nvim diagnostics) pass through to WezTerm
set -as terminal-features ',*:hyperlinks:usstyle'
set -g set-clipboard on
# Let graphics protocols (iTerm2/Kitty/Sixel) pass through tmux to WezTerm.
# Enables real image previews inside yazi + other TUIs running under tmux.
set -g allow-passthrough on
set -g escape-time 0
set -g history-limit 50000
set -g display-time 2000
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
# Killing a session jumps to the next one instead of detaching (pairs with the X kill-picker)
set -g detach-on-destroy off
# Keep the : command prompt emacs-style even with vi copy mode
set -g status-keys emacs

# ============================================================
# MOUSE
# ============================================================
set -g mouse on

# ============================================================
# VI MODE & CLIPBOARD (WSL)
# ============================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

# ============================================================
# SPLITS & NAVIGATION
# ============================================================
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Session viewer (default tmux choose-tree, zoomed, sessions-only)
bind s choose-tree -Zs

# Floating popup shell (current pane's cwd)
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Floating Yazi file manager (current pane's cwd)
bind f display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "yazi"

# Floating session picker: kill (multi-select with Tab)
# (uses X — capital K is taken by resize-pane below)
bind X display-popup -E -w 70% -h 60% "tmux ls -F '#{session_name}' | fzf -m --preview 'tmux capture-pane -ept {} 2>/dev/null' | xargs -r -n1 tmux kill-session -t"

# Floating session picker: switch
bind S display-popup -E -w 70% -h 60% "s=\$(tmux ls -F '#{session_name}' | fzf --preview 'tmux capture-pane -ept {} 2>/dev/null'); [ -n \"\$s\" ] && tmux switch-client -t \"\$s\""

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick swap
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ============================================================
# MENUS
# ============================================================

# Fast local action menu: current pane/window operations only.
bind w display-menu -T "Window Actions" \
  -x R -y P \
  "New window" "n" { new-window } \
  "Split horizontal" "s" { split-window -h } \
  "Split vertical" "v" { split-window -v } \
  "Toggle zoom" "z" { resize-pane -Z } \
  "Rename window" "r" { command-prompt -I "#W" "rename-window -- '%%'" } \
  "Find window/pane" "f" { choose-tree -Zw } \
  "New session" "N" { command-prompt -p "new session name" "new-session -A -s '%%'" } \
  "Switch session" "t" { choose-tree -Zs } \
  "Kill pane" "x" { confirm-before -p "Kill pane #P? (y/n)" "kill-pane" } \
  "Kill window" "X" { confirm-before -p "Kill window #I:#W? (y/n)" "kill-window" }

# Rich workspace menu: global session/window/pane management.
bind g display-menu -T "Workspace Actions" \
  -x R -y P \
  "Browse all windows" "b" { choose-tree -Zw } \
  "Browse sessions" "s" { choose-tree -Zs } \
  "New session" "n" { command-prompt -p "new session name" "new-session -A -s '%%'" } \
  "Rename session" "r" { command-prompt -I "#S" "rename-session -- '%%'" } \
  "Move window to session" "m" { command-prompt -p "target session" "move-window -t '%%'" } \
  "Break pane to window" "p" { break-pane } \
  "Join pane from..." "j" { command-prompt -p "source pane (session:window.pane)" "join-pane -s '%%'" } \
  "Swap window with..." "w" { command-prompt -p "target window" "swap-window -t '%%'" } \
  "Detach client" "d" { detach-client } \
  "Kill session" "X" { confirm-before -p "Kill session #S? (y/n)" "kill-session" }

# ============================================================
# STATUS BAR — acrylic frost over Google Material palette
# ============================================================
# Matches WezTerm top bar colors; layered pills for frosted feel.
set -g status-position bottom
set -g status-interval 15
set -g status-style "bg=#1e1f22,fg=#e8eaed"
set -g status-justify left

# Left: session pill (flashes on prefix/copy) + window/pane counters
#   󱂬 = nf-md-card-text   (session)
#   󰆏 = nf-md-content_copy (copy mode)
#    = nf-oct-browser     (windows)
#   󰓩 = nf-md-dock_bottom  (panes)
#
# Session pill color:
#   blue    — normal
#   yellow  — prefix held
#   green   — copy mode
set -g status-left-length 70
set -g status-left "\
#[fg=#1e1f22,bg=#{?pane_in_mode,#81c995,#{?client_prefix,#fdd663,#8ab4f8}},bold]  #{?pane_in_mode,󰆏 COPY,󱂬 #S} \
#[fg=#{?pane_in_mode,#81c995,#{?client_prefix,#fdd663,#8ab4f8}},bg=#2a2b2f,nobold]\
#[fg=#e8eaed,bg=#2a2b2f]   #I·#{session_windows}  \
#[fg=#9aa0a6,bg=#2a2b2f]│\
#[fg=#e8eaed,bg=#2a2b2f] 󰓩 #P·#{window_panes} \
#[fg=#2a2b2f,bg=#1e1f22] "

# Right: prefix/zoom + git (conditional) + battery, via helper script
#   󰌌 = nf-md-keyboard (prefix)
#   󰍉 = nf-md-magnify  (zoom)
set -g status-right-length 100
set -g status-right "\
#[fg=#fdd663,dim]#{?client_prefix, 󰌌 ,}\
#[fg=#81c995,dim]#{?window_zoomed_flag, 󰍉 ,}\
#[fg=#2a2b2f,bg=#1e1f22]#[fg=#e8eaed,bg=#2a2b2f] \
#(~/.tmux/status-right.sh '#{pane_current_path}')\
#[fg=#2a2b2f,bg=#1e1f22] "

# Window tabs — frosted pills with a glass mid-layer.
# #{?window_flags,#{window_flags},} — shows tmux's own flags (* active, - last, ! bell, # activity, Z zoomed).
# The "·cmd" suffix shows the current command when it's not just a shell.
setw -g window-status-format "\
#[fg=#2a2b2f,bg=#1e1f22]\
#[fg=#9aa0a6,bg=#2a2b2f]  #I #W\
#[fg=#5f6368,bg=#2a2b2f]#{?#{m:*sh,#{pane_current_command}},, ·#{pane_current_command}} \
#[fg=#2a2b2f,bg=#1e1f22]"
setw -g window-status-current-format "\
#[fg=#3c4043,bg=#1e1f22]\
#[fg=#e8eaed,bg=#3c4043,bold]  #I #W\
#[fg=#8ab4f8,bg=#3c4043,nobold]#{?#{m:*sh,#{pane_current_command}},, ·#{pane_current_command}}  \
#[fg=#3c4043,bg=#1e1f22]"
setw -g window-status-separator " "

# Activity / bell badges on inactive tabs
setw -g monitor-activity on
setw -g monitor-bell on
setw -g visual-activity off
setw -g visual-bell off
setw -g window-status-activity-style "fg=#fdd663,bg=#2a2b2f,bold"
setw -g window-status-bell-style "fg=#f28b82,bg=#2a2b2f,bold"

# Borders — faint frosted edges
set -g pane-border-style "fg=#2a2b2f"
set -g pane-active-border-style "fg=#8ab4f8"
set -g message-style "bg=#2a2b2f,fg=#e8eaed"

# Popups & menus — rounded frosted glass to match the status bar
set -g popup-border-lines rounded
set -g popup-border-style "fg=#8ab4f8"
set -g popup-style "bg=#1e1f22"
set -g menu-border-lines rounded
set -g menu-border-style "fg=#8ab4f8"
set -g menu-style "bg=#2a2b2f,fg=#e8eaed"
set -g menu-selected-style "bg=#8ab4f8,fg=#1e1f22,bold"

# ============================================================
# RELOAD
# ============================================================
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ============================================================
# PLUGINS (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum: auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

